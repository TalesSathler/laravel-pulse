name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5
          tools: composer
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: cp .env.example .env
      - run: echo "APP_ENV=production" >> .env
      - run: composer install --no-dev --no-interaction --prefer-dist --no-scripts
      - run: php artisan key:generate --ansi
      - run: npm ci
      - run: npm run build
      - name: Generate static index.html
        run: |
          python3 << 'PYEOF'
          import json
          with open("public/build/manifest.json") as f:
              m = json.load(f)["resources/js/app.ts"]
          css = m["css"][0]
          js = m["file"]
          page = json.dumps({
              "component": "Welcome",
              "props": {
                  "auth": {"user": None},
                  "flash": {"success": None},
                  "name": "Laravel Pulse",
                  "sidebarOpen": True,
                  "appEnv": "production",
              },
              "url": "/",
              "version": "",
          })
          html = f"""<!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <script>(function(){{const e=window.matchMedia("(prefers-color-scheme: dark)");e.matches&&document.documentElement.classList.add("dark")}})()</script>
            <link rel="icon" href="favicon.ico" sizes="any">
            <link rel="icon" href="favicon.svg" type="image/svg+xml">
            <link rel="apple-touch-icon" href="apple-touch-icon.png">
            <link rel="stylesheet" href="{css}">
          </head>
          <body class="font-sans antialiased">
            <div id="app"></div>
            <script data-page="app" type="application/json">{page}</script>
            <script type="module" src="{js}"></script>
          </body>
          </html>"""
          with open("public/build/index.html", "w") as f:
              f.write(html)
          PYEOF
      - name: Copy static assets to build output
        run: cp public/favicon.ico public/favicon.svg public/apple-touch-icon.png public/build/
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: public/build
      - uses: actions/deploy-pages@v5
        if: github.event_name != 'pull_request'
