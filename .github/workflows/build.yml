name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  vite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5
          tools: composer
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: composer install --no-dev --no-interaction --prefer-dist
      - run: npm ci
      - run: npm run build
